name: Windows Build

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build
        run: cmake --build --preset release

      - name: Verify SSOT paths
        shell: pwsh
        run: ./scripts/verify-ssot-paths.ps1
